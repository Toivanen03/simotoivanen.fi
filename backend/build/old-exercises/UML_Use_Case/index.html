<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <title>Simo Toivanen</title>
  <link rel="icon" type="image/x-icon" href="/img/favicon.ico">
  <meta name="description" content="UML Use Case - harjoitus">
  <meta name="robots" content="noindex, nofollow">

  <link href="/Bootstrap/bootstrap-5.3.3-dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="/Bootstrap/bootstrap-5.3.3-dist/js/bootstrap.min.js"></script>

  <link rel="stylesheet" media="screen and (min-width: 1024px)" href="css/styles.css">
  <link rel="stylesheet" media="screen and (max-width: 1023px)" href="css/mobile.css">
  <link rel="stylesheet" media="screen and (min-width: 1024px)" href="css/index.css">
  <link rel="stylesheet" media="screen and (max-width: 1023px)" href="css/mobile_index.css">
</head>

<body>
<main>
  <div class="program">
    <script src="vote.js"></script>
    <section class="jumbotron text-center">
      <div class="container">
        <h1 class="jumbotron-heading">Äänestyssovellus</h1>
        <span id="roleHeader" class="lead text-muted"></span>
        <p>
          <span id="buttonOne" class="frontPageButton btn btn-primary my-2"></span>
          <span id="buttonTwo" class="frontPageButton btn btn-secondary my-2"></span>
        </p>
      </div>
    </section>

    <div id="voteBlock" class="album py-5 bg-light">
      <div class="container">
        <div class="row">
          <div class="col">
            <div class="card box-shadow">
              <div class="card-body d-flex flex-column">
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    
    <div id="myModal" class="modal">
      <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <p id="modalText"></p>
        <button id="voteButton" onclick="vote()">Äänestä</button>
      </div>
    </div>
  </div>

  <div class="mobileMessage">
    <div class="row text-center message">
      <p>Sivu toimii vain työpöytäselaimella.</p>
    </div>
  </div>

</main>
</body>
</html>
