<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/x-icon" href="/img/favicon.ico">

    <title>Kaverilista 2.0</title>

<body>
    <h2>Kaverilista</h2>
    <h3>Versio 2</h3>
    <div class="container text-center">
        <div class="row">

            <div class="col-md-2">
                <input type="text" id="nimet" placeholder="Kirjoita kaverin nimi" style="text-align: center;">
                <p></p>
                <button type="button" id="poista" class="btn btn-primary"><b>Poista kaveri</b></button>
                <p></p>
                <button type="button" id="jarjesta" class="btn btn-primary"><b>Järjestä kaverit</b></button>
                <div id="Kaverit">
                    <script src="friends.js"></script>
                </div>
            </div>

            <div class="col-md-3">
                <div id="KaveriLaatikko">
                    <p>Kaverit:</p>
                </div>
            </div>

            <div class="col-md-6">
                <p>Anna kaverin nimi tekstikenttään ja <i>paina <b>ENTER.</b></i><br></p>
                <p>Voit antaa kymmenen (10) nimeä.</p>
            </div>
        </div>
    </div>
</body>
