<!DOCTYPE html>
<html lang="fi">
<head>
    <link rel="canonical" href="https://simotoivanen.fi/old-exercises/Lomake/lomake.html">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lomakkeen validointi</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <meta name="description" content="Simo Toivanen - Lomakeharjoitus">
    <meta property="og:title" content="Lomakkeen validointi">
    <meta property="og:description" content="Lomakkeen validointi Javascriptillä">
    <meta property="og:image" content="/img/simo.jpg">
    <meta property="og:url" content="https://simotoivanen.fi/old-exercises/Lomake/lomake.html">
    <link href="/Bootstrap/bootstrap-5.3.3-dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="/Bootstrap/bootstrap-5.3.3-dist/js/bootstrap.min.js"></script>
    <meta name="robots" content="noindex, nofollow">

    <link rel="stylesheet" media="screen and (min-width: 1024px)" href="css/styles.css">
    <link rel="stylesheet" media="screen and (max-width: 1023px)" href="css/mobiili.css">
</head>

<body>
<main>
    <h2>Lomakkeen validointi</h2>
    <br>
    <div class="container lomakeBoksi">
        <form name="lomake" class="lomake varjo" onsubmit="return validateForm()">
            <h3>Rekisteröitymislomake</h3><br>

                <div class="row">
                    <div class="col-3">
                        <p>Käyttäjätunnus:</div>
                    <div class="col-2">    
                        <input type="text" id="tunnus"></p>
                    </div>
                    <p id="tunnusOk" style="font-size: 12px; color: darkgray; font-style: italic;"></p>
                </div>

                <div class="row">
                    <div class="col-3">
                        <p>Salasana:</div>
                    <div class="col-2">        
                        <input type="password" id="salasana"></p>
                    </div>
                    <p id="salasanaOk" style="font-size: 12px; color: darkgray; font-style: italic;"></p>
                </div>

                <div class="row">
                    <div class="col-3">
                        <p>Vahvista salasana:</div>
                    <div class="col-2">        
                        <input type="password" id="salasanaCheck"></p>
                    </div>
                    <p id="salasanaCheckOk" style="font-size: 12px; color: darkgray; font-style: italic;"></p>
                </div>

                <div class="row">
                    <div class="col-3">
                        <p>Nimi:</div>
                    <div class="col-2">
                        <input type="text" id="nimi"></p>
                    </div>
                    <p id="nimiOk" style="font-size: 12px; color: darkgray; font-style: italic;"></p>
                </div>

                <div class="row">
                    <div class="col-3">
                        <p>Osoite:</div>
                    <div class="col-2">
                        <input type="text" id="osoite"></p>
                    </div>
                    <p id="osoiteOk" style="font-size: 12px; color: darkgray; font-style: italic;"></p>
                </div>

                <div class="row">
                    <div class="col-3">
                        <p>Maa:</div>
                    <div class="col-2">
                        <select id="maa" class="maa">
                            <option value="" selected="selected">Valitse maa:</option>
                            <option value="Suomi">Suomi</option>
                            <option value="Ruotsi">Ruotsi</option>
                            <option value="Norja">Norja</option>
                            <option value="Tanska">Tanska</option>
                            <option value="Viro">Viro</option>
                            <option value="Latvia">Latvia</option>
                            <option value="Liettua">Liettua</option>
                            <option value="Venäjä">Venäjä</option>
                            <option value="Muu">Muu</option>
                        </select></p>
                    </div>
                    <p id="maaOk" style="font-size: 12px; color: darkgray; font-style: italic;"></p>
                </div>
                
                <div class="row">
                    <div class="col-3">
                        <p>Postinumero:</div>
                    <div class="col-2">
                        <input type="text" id="postinumero"></p>
                    </div>
                    <p id="postinumeroOk" style="font-size: 12px; color: darkgray; font-style: italic;"></p>
                </div>

                <div class="row">
                    <div class="col-3">
                        <p>Sähköposti:</div>
                    <div class="col-2">
                        <input type="text" id="email"></p>
                    </div>
                    <p id="emailOk" style="font-size: 12px; color: darkgray; font-style: italic;"></p>
                </div>

                <div class="row">
                    <div class="col-3">
                        <p>Vahvista sähköposti:</div>
                    <div class="col-2">
                        <input type="text" id="emailCheck"></p>
                    </div>
                    <p id="emailCheckOk" style="font-size: 12px; color: darkgray; font-style: italic;"></p>
                </div>
                
                <div class="row mobiilifontti">
                    <div class="col-1" style="margin-right: -2vw;">
                        <p>Sukupuoli:</div>
                    <div class="col-8 align-items-center radiobuttons">
                        <input type="radio" id="sukupuoliMies" name="sukupuoli" value="Mies" class="marginaali">
                        Mies
                        <input type="radio" id="sukupuoliNainen" name="sukupuoli" value="Nainen" class="marginaali">
                        Nainen
                        <input type="radio" id="sukupuoliUndefined" name="sukupuoli" value="Undefined" class="marginaali">
                        Muu</p>
                    </div>
                    <p id="sukupuoliOk" style="font-size: 12px; color: darkgray; font-style: italic;"></p>
                </div>
                
                <div class="row mobiilifontti">
                    <div class="col-1" style="margin-right: -2vw;">
                        <p>Kieli:</div>
                        <div class="col-8 align-items-center radiobuttons">
                        <input type="checkbox" id="suomi" name="suomi" value="Suomi" class="marginaali">
                        Suomi
                        <input type="checkbox" id="muu" name="muu" value="Muu" class="marginaali">
                        Muu</p>
                    </div>
                    <p id="kieliOk" style="font-size: 12px; color: darkgray; font-style: italic;"></p>
                </div>

                <div class="row">
                    <div class="col-3">
                        <p>Lisätietoja:<p class="fontti">(vapaaehtoinen)</p></div>
                    <div class="col-8">
                        <textarea id="viesti" class="mobiilifontti" name="viesti" rows="4" cols="30" placeholder="Voit antaa lisätietoja tähän."></textarea></p>
                    </div>
                </div>

                <div class="row">
                    <div class="text-center">
                    <p id="virhe" style="font-size: 14px; color: rgb(207, 45, 45); font-style: italic;"></p>
                </div>

                <br>
                <div class="row">
                    <div class="text-center">
                        <input class="btn btn-secondary" type="submit" value="Lähetä">
                    </div>
                </div>

            <script src="lomake.js"></script>              
        </form>
    </div>
</main> 
</body>
</html>
